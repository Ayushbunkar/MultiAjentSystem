  <rect class="bar2" x="420" y="70" width="300" height="120" />

  <text class="label" x="260" y="205" text-anchor="middle">Critic input</text>
  <text class="label" x="570" y="205" text-anchor="middle">Writer input</text>

  <text class="label" x="260" y="105" text-anchor="middle">~500 tokens</text>
  <text class="label" x="570" y="65" text-anchor="middle">~1000 tokens</text>

