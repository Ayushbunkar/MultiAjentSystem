<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260">
  <style>
    .axis { stroke:#64748b; stroke-width:1.5; }
    .bar { fill:#c7d2fe; }
    .bar2 { fill:#86efac; }
    .bar3 { fill:#fde68a; }
    .bar4 { fill:#fca5a5; }
    .txt { font-family: Arial, sans-serif; font-size:12px; fill:#0f172a; }
    .label { font-family: Arial, sans-serif; font-size:11px; fill:#334155; }
  </style>

  <line class="axis" x1="80" y1="210" x2="920" y2="210" />
  <line class="axis" x1="80" y1="40" x2="80" y2="210" />

  <rect class="bar" x="120" y="70" width="140" height="30" />
  <rect class="bar2" x="120" y="110" width="200" height="30" />
  <rect class="bar3" x="120" y="150" width="300" height="30" />
  <rect class="bar4" x="120" y="190" width="160" height="30" />

  <text class="label" x="90" y="90" text-anchor="end">Search</text>
  <text class="label" x="90" y="130" text-anchor="end">Scrape</text>
  <text class="label" x="90" y="170" text-anchor="end">Write</text>
  <text class="label" x="90" y="210" text-anchor="end">Critique</text>

  <text class="txt" x="120" y="30">Pipeline timing (illustrative, ms)</text>
  <text class="label" x="270" y="90">~350 ms</text>
  <text class="label" x="330" y="130">~500 ms</text>
  <text class="label" x="430" y="170">~750 ms</text>
  <text class="label" x="290" y="210">~400 ms</text>
</svg>
