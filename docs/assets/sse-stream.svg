<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
  <style>
    .txt { font-family: Arial, sans-serif; font-size:12px; fill:#0f172a; }
    .line { stroke:#64748b; stroke-width:1.5; marker-end:url(#arrow); }
    .dot { fill:#2563eb; }
    .label { font-family: Arial, sans-serif; font-size:11px; fill:#1f2937; }
  </style>

  <line class="line" x1="60" y1="70" x2="900" y2="70" />

  <circle class="dot" cx="80" cy="70" r="6" />
  <text class="label" x="80" y="100" text-anchor="middle">search:processing</text>

  <circle class="dot" cx="200" cy="70" r="6" />
  <text class="label" x="200" y="100" text-anchor="middle">search:complete</text>

  <circle class="dot" cx="320" cy="70" r="6" />
  <text class="label" x="320" y="100" text-anchor="middle">scrape:complete</text>

  <circle class="dot" cx="440" cy="70" r="6" />
  <text class="label" x="440" y="100" text-anchor="middle">report_chunk*</text>

  <circle class="dot" cx="560" cy="70" r="6" />
  <text class="label" x="560" y="100" text-anchor="middle">report:complete</text>

  <circle class="dot" cx="680" cy="70" r="6" />
  <text class="label" x="680" y="100" text-anchor="middle">feedback:complete</text>

  <circle class="dot" cx="800" cy="70" r="6" />
  <text class="label" x="800" y="100" text-anchor="middle">done</text>

  <text class="txt" x="60" y="150">* report_chunk can repeat many times while the report is streaming.</text>
</svg>
