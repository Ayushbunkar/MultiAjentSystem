<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
  <style>
    .box { fill:#f8fafc; stroke:#64748b; stroke-width:1.5; rx:8; }
    .box2 { fill:#eef7f1; stroke:#4b7b59; stroke-width:1.5; rx:8; }
    .txt { font-family: Arial, sans-serif; font-size:12px; fill:#0f172a; }
    .line { stroke:#64748b; stroke-width:1.5; marker-end:url(#arrow); }
  </style>

  <!-- Top row -->
  <rect class="box" x="20" y="30" width="120" height="48" />
  <text class="txt" x="80" y="58" text-anchor="middle">User</text>

  <rect class="box" x="170" y="30" width="140" height="48" />
  <text class="txt" x="240" y="58" text-anchor="middle">Frontend</text>

  <rect class="box" x="340" y="30" width="140" height="48" />
  <text class="txt" x="410" y="58" text-anchor="middle">FastAPI</text>

  <rect class="box" x="510" y="30" width="140" height="48" />
  <text class="txt" x="580" y="58" text-anchor="middle">Pipeline</text>

  <rect class="box" x="700" y="30" width="140" height="48" />
  <text class="txt" x="770" y="58" text-anchor="middle">Cache</text>

  <line class="line" x1="140" y1="54" x2="170" y2="54" />
  <line class="line" x1="310" y1="54" x2="340" y2="54" />
  <line class="line" x1="480" y1="54" x2="510" y2="54" />
  <line class="line" x1="650" y1="54" x2="700" y2="54" />

  <!-- Stage row -->
  <rect class="box2" x="170" y="220" width="120" height="48" />
  <text class="txt" x="230" y="248" text-anchor="middle">Search</text>

  <rect class="box2" x="310" y="220" width="120" height="48" />
  <text class="txt" x="370" y="248" text-anchor="middle">Scrape</text>

  <rect class="box2" x="450" y="220" width="120" height="48" />
  <text class="txt" x="510" y="248" text-anchor="middle">Writer</text>

  <rect class="box2" x="590" y="220" width="120" height="48" />
  <text class="txt" x="650" y="248" text-anchor="middle">Critic</text>

  <line class="line" x1="580" y1="78" x2="230" y2="220" />
  <line class="line" x1="580" y1="78" x2="370" y2="220" />
  <line class="line" x1="580" y1="78" x2="510" y2="220" />
  <line class="line" x1="580" y1="78" x2="650" y2="220" />

  <text class="txt" x="490" y="140" text-anchor="middle">SSE updates stream back to UI</text>
</svg>
